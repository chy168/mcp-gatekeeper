name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Cross-compile
        run: make cross

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes

  update-tap:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}

      - name: Update Homebrew tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION_NO_V="${VERSION#v}"
          BASE_URL="https://github.com/chy168/mcp-gatekeeper/releases/download/${VERSION}"

          SHA_DARWIN_ARM64=$(curl -sL "${BASE_URL}/mcp-gatekeeper-darwin-arm64" | sha256sum | awk '{print $1}')
          SHA_DARWIN_AMD64=$(curl -sL "${BASE_URL}/mcp-gatekeeper-darwin-amd64" | sha256sum | awk '{print $1}')
          SHA_LINUX_ARM64=$(curl -sL "${BASE_URL}/mcp-gatekeeper-linux-arm64"   | sha256sum | awk '{print $1}')
          SHA_LINUX_AMD64=$(curl -sL "${BASE_URL}/mcp-gatekeeper-linux-amd64"   | sha256sum | awk '{print $1}')

          cat > mcp-gatekeeper.rb <<RUBY
class McpGatekeeper < Formula
  desc "Lightweight stdio proxy for filtering MCP server tool lists"
  homepage "https://github.com/chy168/mcp-gatekeeper"
  version "${VERSION_NO_V}"

  on_macos do
    if Hardware::CPU.arm?
      url "${BASE_URL}/mcp-gatekeeper-darwin-arm64"
      sha256 "${SHA_DARWIN_ARM64}"

      def install
        bin.install "mcp-gatekeeper-darwin-arm64" => "mcp-gatekeeper"
      end
    else
      url "${BASE_URL}/mcp-gatekeeper-darwin-amd64"
      sha256 "${SHA_DARWIN_AMD64}"

      def install
        bin.install "mcp-gatekeeper-darwin-amd64" => "mcp-gatekeeper"
      end
    end
  end

  on_linux do
    if Hardware::CPU.arm?
      url "${BASE_URL}/mcp-gatekeeper-linux-arm64"
      sha256 "${SHA_LINUX_ARM64}"

      def install
        bin.install "mcp-gatekeeper-linux-arm64" => "mcp-gatekeeper"
      end
    else
      url "${BASE_URL}/mcp-gatekeeper-linux-amd64"
      sha256 "${SHA_LINUX_AMD64}"

      def install
        bin.install "mcp-gatekeeper-linux-amd64" => "mcp-gatekeeper"
      end
    end
  end

  test do
    assert_match "Usage:", shell_output("#{bin}/mcp-gatekeeper 2>&1", 1)
  end
end
RUBY

          git clone "git@github.com:chy168/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp mcp-gatekeeper.rb tap/Formula/mcp-gatekeeper.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mcp-gatekeeper.rb
          git diff --cached --quiet && echo "No changes" || git commit -m "mcp-gatekeeper ${VERSION}"
          git push
